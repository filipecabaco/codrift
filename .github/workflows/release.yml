name: Release

# Reusable + manually dispatchable. `auto-release.yml` computes the next semver
# from Conventional Commit prefixes and calls this workflow; a maintainer can
# also cut a specific version by hand via "Run workflow". The version is the
# single source of truth — it names the DMG, the CLI tarball, the git tag, the
# GitHub Release, and the Homebrew cask.
on:
  workflow_call:
    inputs:
      version:
        description: "Version to release, without a leading v (e.g. 1.2.3)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without a leading v (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bundle:
    name: Bundle · ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            cli_suffix: aarch64-apple-darwin
          - target: x86_64-apple-darwin
            runner: macos-13
            cli_suffix: x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            cli_suffix: x86_64-linux-gnu

    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@v4

      # ── Toolchains ───────────────────────────────────────────────────────────
      # OTP 27: ex_tauri wraps the Elixir sidecar with Burrito, which does not yet
      # support OTP 28.
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: assets/pnpm-lock.yaml

      # Burrito wraps the sidecar with Zig; it pins an exact version and also
      # needs `xz` on PATH.
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      # Linux Tauri builds need GTK/WebKit system libraries; xz for Burrito.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf xz-utils

      # ── Dependencies ─────────────────────────────────────────────────────────
      - name: Elixir deps
        run: mix deps.get --only prod

      - name: Frontend deps + build
        working-directory: assets
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # ── Version sync ─────────────────────────────────────────────────────────
      # Tauri names the DMG `Codrift_<version>_<arch>.dmg` from the version in
      # tauri.conf.json — NOT any git ref. Stamp the release version in before
      # the build so the produced asset name matches the URL the Homebrew cask
      # expects (Casks/codrift.rb). Without this every build would ship a
      # `Codrift_0.0.1_*.dmg` and the cask URL would 404.
      - name: Sync app version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json
          echo "tauri.conf.json version set to $VERSION"

      # ── Desktop bundle ───────────────────────────────────────────────────────
      # `mix ex_tauri.build` assembles the :desktop release, Burrito-wraps it as
      # the Tauri sidecar (burrito_out/desktop-<triple>), and bundles the app.
      # BURRITO_TARGET limits Burrito to the runner's native triple so we never
      # attempt a cross-OS BEAM build.
      - name: Build Tauri bundle
        env:
          CARGO_PROFILE_RELEASE_LTO: true
          BURRITO_TARGET: ${{ matrix.target }}
        run: mix ex_tauri.build --ci --target ${{ matrix.target }}

      # ── Headless CLI ─────────────────────────────────────────────────────────
      # The `codrift` release is the headless CLI (mcp / initiative / session /
      # memory / integration / update). Shipped alongside the app so users can run
      # `codrift mcp install` and scripting commands.
      - name: Build CLI release
        run: mix release codrift --overwrite

      - name: Rename CLI tarball
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          mv _build/prod/codrift-*.tar.gz \
             "codrift-cli-${VERSION}-${{ matrix.cli_suffix }}.tar.gz"

      # Emit `<asset>.sha256` next to every published asset. install.sh and
      # Codrift.Updater verify downloads against these before installing.
      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          shopt -s globstar nullglob
          for f in src-tauri/target/${{ matrix.target }}/release/bundle/**/*.{dmg,AppImage,deb} \
                   codrift-cli-*.tar.gz; do
            (cd "$(dirname "$f")" && shasum -a 256 "$(basename "$f")" > "$(basename "$f").sha256")
          done

      # ── Publish ──────────────────────────────────────────────────────────────
      # No tag exists yet (this workflow is called on a branch push), so the
      # action creates the `v<version>` tag at the current SHA and the Release in
      # one shot. Runs on every matrix leg; softprops is idempotent — the first
      # creates the release, the rest append their assets.
      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sha256
            codrift-cli-*.tar.gz
            codrift-cli-*.tar.gz.sha256
          generate_release_notes: true

  # ── Homebrew cask bump ───────────────────────────────────────────────────────
  # This repo doubles as its own Homebrew tap (Casks/codrift.rb). After both
  # macOS DMGs are published to the release, pull them back down, hash them, and
  # rewrite the cask's version + per-arch checksums, then push to main so
  # `brew upgrade` sees the new version immediately.
  #
  # NOTE: this pushes a commit to `main`. If main is protected against direct
  # pushes, swap the "Commit and push" step for a `gh pr create` on a branch.
  update-cask:
    name: Bump Homebrew cask
    needs: bundle
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download macOS DMGs from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "v${{ inputs.version }}" \
            --pattern 'Codrift_*_aarch64.dmg' \
            --pattern 'Codrift_*_x64.dmg' \
            --dir dmgs

      - name: Rewrite cask version + checksums
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          ARM_SHA="$(shasum -a 256 dmgs/Codrift_"${VERSION}"_aarch64.dmg | awk '{print $1}')"
          INTEL_SHA="$(shasum -a 256 dmgs/Codrift_"${VERSION}"_x64.dmg | awk '{print $1}')"
          echo "version=$VERSION arm=$ARM_SHA intel=$INTEL_SHA"

          # The arm block precedes the intel block in the cask, so replacing the
          # two sha256 lines in order maps arm -> intel correctly.
          VERSION="$VERSION" ARM_SHA="$ARM_SHA" INTEL_SHA="$INTEL_SHA" python3 - <<'PY'
          import os, re
          f = "Casks/codrift.rb"
          s = open(f).read()
          s = re.sub(r'version "[^"]*"', f'version "{os.environ["VERSION"]}"', s, count=1)
          shas = iter([os.environ["ARM_SHA"], os.environ["INTEL_SHA"]])
          s = re.sub(r'sha256 "[^"]*"', lambda m: f'sha256 "{next(shas)}"', s, count=2)
          open(f, "w").write(s)
          PY

      - name: Commit and push
        run: |
          VERSION="${{ inputs.version }}"
          if git diff --quiet Casks/codrift.rb; then
            echo "Cask already up to date; nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/codrift.rb
          git commit -m "chore(cask): codrift ${VERSION} [skip ci]"
          # main may have advanced while the bundles built; rebase before pushing.
          git pull --rebase origin main
          git push origin main
